<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css transition property</title>
    <style>
        .container{
            height: 200px;
            width: 200px;
            border: 3px solid green;
            background-color: yellow;
        }
        .container:hover{
            /* font-size:20px ; */
            font-weight: bold;
            color:green;
            border:3px solid black;
            background-color: aqua;
            transition: all 3s ease-in .5s;
        }
        

    </style>
</head>
<body>
    <div class="container">
        this is a box.
    </div>

    
</body>
</html>
