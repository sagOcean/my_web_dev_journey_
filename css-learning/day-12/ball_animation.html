<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ball animation</title>
    <style>
        :root{
            --valueX:0;
            --valueY:0;
        }
        .container {
            height: 60vh;
            width: 80vw;
            border: 3px solid black;
            position: relative;
        }

        .box {
            height: 40px;
            width: 40px;
            background-color: red;
            border: 2px solid purple;
            border-radius: 50%;
            position: absolute;
            
            

        }

        @keyframes animateX {
            from{
                left: 0%;
            }
            to{
                left: 100%;
            }
        }
        @keyframes animateY {
            from{
                bottom: 0%;
            }
            to{
               bottom: 100%;
            }
            }
        .box{
            animation:  animateX 3s linear infinite alternate , animateY .5s  ease-out infinite alternate;
        }
         

        
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
