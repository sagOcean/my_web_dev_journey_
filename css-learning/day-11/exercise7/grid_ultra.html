<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ultraedit grid</title>
    <style>
        .container{
            display:grid;
            /* border: none; */
            height: 100vh;
            width: 100vw;
            grid-template-columns: 280px 280px 280px;
            row-gap: 30px;
            justify-content: center;
            align-content: center;
            /* justify-items: center; */
           
            
            
        }
        .item{
            border:none;
            height: 100px;
            width: 250px;
            background-color: rgba(165, 159, 159, 0.179);
            /* gap: 20px 40px; */
            

        }
        .item h3{
            text-align: center;
            /* grid-template-columns: 1fr 1fr; */
            font-family: Calibri;
        }
        .but{
            /* display:inline-block; */
            /* flex-direction: row;
            justify-content: center; */
            /* align-items: center; */
            /* margin: 6px; */
            height:25px;
            border-radius :10px;
            flex:1;
            

        }
        .but32{
            background-color: rgb(33, 205, 205);
            border:none;
            font-weight: bold;
            color:white
            
        }
        .but64{
            background-color: rgb(22, 213, 89);
            border:none;
            font-weight: bold;
            color:white;
        }
        .button-group{
            display:flex;
            /* flex:1; */
            gap: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item">
            <h3>english</h3>
            <div class="button-group">

                <button class="but but32">download 32 bit</button>
                <button class="but but64">download 64 bit</button>
            </div>
        </div>
        <div class="item">
            <h3>Deutsch 
            </h3>

        </div>
