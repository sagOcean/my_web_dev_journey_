<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel form</title>
    <style>
        /* Page background */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        /* Main form box */
        form {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Headings */
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        h2 {
            margin-top: 20px;
            color: #2c3e50;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }

        /* Labels */
        label {
            display: inline-block;
            margin: 8px 0 4px;
            font-weight: bold;
            color: #444;
        }

        /* Inputs and selects */
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        /* Focus effect */
        input:focus,
        select:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        /* Radio buttons */
        input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }

        /* Radio group layout */
        label input[type="radio"] {
            margin-left: 10px;
        }

        /* Checkbox center section */
        div[style*="text-align: center"] {
            margin: 20px 0;
            font-size: 14px;
        }

        /* Submit button */
        input[type="submit"] {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #217dbb;
        }

        /* Small spacing between sections */
        div {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1 style="text-align: center;">Form</h1>
    <form action="submit.php" method="post">
        <h2>personal information:</h2>
        <div>
            <label for="fullName">Your name:</label>
            <input type="text" name="Name" id="fullName" placeholder="enter your full name" required><br>
            <label for="email">Email:</label>
            <input type="email" name="Email" id="email" placeholder="enter your email address " required><br>
            <label for="phoneNumber">Phone number:</label>
            <input type="tel" name="Phone_number" id="phoneNumber" required><br>
            <label for="DateofBirth">DOB:</label>
            <input type="date" name="Date" id="DateofBirth"><br>
            <label for="nationality">Nationality:</label>
            <input type="text" name="nationality" id="nationality">
        </div>
        <h2>Travel details:</h2>
        <div>
            <label for="destination">Destination address:</label>
            <input type="text" name="dest" id="destination" required> <br>

            <label for="departure">Departure: </label>
            <input type="text" name="departure" id="departure" required><br>

            <label for="travel_start">Travel start date:</label>
            <input type="date" name="travel_start" id="travel_start">

            <label for="travel_return">Travel return date:</label>
            <input type="date" name="travel_return" id="travel_return">


            <label for="numberofTravelers">No. of travelers:</label>
            <input type="number" name="no_of_travelers" id="numberofTravelers" required min="1">

            <br><label>Type of trip:</label>

            <label>
                <input type="radio" name="triptype" value="solo"> Solo
            </label>

            <label>
                <input type="radio" name="triptype" value="couple"> Couple
            </label>

            <label>
                <input type="radio" name="triptype" value="family"> Family
            </label>

            <label>
                <input type="radio" name="triptype" value="group"> Group
            </label>
        </div>
        <h2>Accommodation preferences:</h2>
        <div>
            <label>Hotel type:</label>
            <select name="hotelType" required>
                <option value="budget">Budget</option>
                <option value="standard">Standard</option>
                <option value="luxury">Luxury</option>
            </select>

            <br><label>Room type:</label>
            <select name="roomType" required>
                <option value="single">Single</option>
                <option value="double">Double</option>
                <option value="suite">Suite</option>
            </select>

            <br><label for="numberofRooms">Number of rooms:</label>
            <input type="number" name="roomNumbers" id="numberofRooms" min="1"required>
        </div>
        <h2>Payment Information</h2>
        <div>
            <label for="paymentMethod">Payment Method:</label>
            <select name="payment_method" required>
                <option value="card">Card</option>
                <option value="upi">UPI</option>
                <option value="bank">Bank Transfer</option>
            </select>
        </div><br>
        <div style="text-align: center;">
            <input type="checkbox" name="accept_terms" id="accept">

            <label for="accept">I accept the given terms and conditions.</label>
        </div>

        <input type="submit" value="submit">


    </form>
