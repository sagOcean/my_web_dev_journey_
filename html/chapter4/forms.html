<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms in html</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        form {
            background-color: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(31, 18, 18, 0.1);
        }

        label {
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #581515;
            border-radius: 5px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        div {
            margin-bottom: 10px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #007bff;
            outline: none;
        }
    </style>
</head>

<body>
    <form action="submit.php" method="post">
        <label for="Name">Name:</label>
        <input type="text" name="Username" id="Name" placeholder="enter your name">
        <label for="Password">Password</label>

        <input type="password" name="password" id="Password" placeholder="enter your password">
        <div>
            <label for="Gender">Gender:</label>
            <input type="radio" name="Gender" id="male" placeholder="" value="male">
            <label for="male">Male</label>
            <input type="radio" name="Gender" id="female" placeholder="" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <label for="comment">Comment:</label>
            <textarea name="Comment" id="comment" placeholder="enter your comment"></textarea>
        </div>
        <div>
            <label for="documents">Available documents:</label>
            <label for="SEE">SEE</label>
            <input type="checkbox" name="documents" id="SEE" value="SEE">
            <label for="SLC">SLC</label>
            <input type="checkbox" name="documents" id="SLC" value="SLC">
            <label for="bachelors">Bachelors</label>
            <input type="checkbox" name="documents" id="bachelors" value="bachelors">
        </div>
        <div>
            <label for="country">Choose country:</label>

            <select id="country">
                <option>Nepal</option>
                <option>India</option>
                <option>China</option>
            </select>
        </div>
        <div>
            <label for="degree">which board did you pass?</label>
            <select name="degree" id="degree">
                <option value="SEE">SEE</option>
                <option value="NEB">+2/NEB</option>
                <option value="cbse">CBSE</option>
            </select>
        </div>



    </form>
</body>

</html>
